name: EMPM data feed

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: empm-feed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check secrets
        env:
          K: ${{ secrets.ALPACA_KEY_ID }}
          S: ${{ secrets.ALPACA_SECRET }}
        run: |
          echo "Key ID length: ${#K}"
          echo "Secret length: ${#S}"

      - name: Fetch daily bars
        env:
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python empm_feed.py

      - name: Commit refreshed data
        run: |
          git config user.name  "empm-bot"
          git config user.email "empm-bot@users.noreply.github.com"
          git add empm_data.js
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%FT%TZ)"
          git push
